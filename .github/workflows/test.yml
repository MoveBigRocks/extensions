name: Test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Validate First-Party Extensions
    runs-on: ubuntu-latest
    env:
      PLATFORM_REF: main
    steps:
      - name: Checkout extension sources
        uses: actions/checkout@v4

      - name: Checkout platform sources for CLI validation
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/platform
          ref: ${{ env.PLATFORM_REF }}
          path: platform

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache-dependency-path: |
            go.mod
            platform/go.mod
            platform/go.sum

      - name: Set up Go workspace
        run: |
          rm -f go.work go.work.sum
          go work init .
          go work use ./platform

      - name: Run extension Go tests
        run: go test ./...

      - name: Build mbr CLI
        working-directory: platform
        run: go build -o "${RUNNER_TEMP}/mbr" ./cmd/mbr

      - name: Validate first-party extension contracts
        env:
          MBR_BIN: ${{ runner.temp }}/mbr
        run: bash ./scripts/validate-first-party.sh
