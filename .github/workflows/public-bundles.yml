name: Public Extension Bundles

on:
  push:
    tags:
      - 'ats-v*'
      - 'community-feature-requests-v*'
      - 'error-tracking-v*'
      - 'sales-pipeline-v*'
      - 'web-analytics-v*'
  workflow_dispatch:
    inputs:
      extension:
        description: Extension to publish
        required: true
        type: choice
        options:
          - ats
          - community-feature-requests
          - error-tracking
          - sales-pipeline
          - web-analytics
      publish_tag:
        description: Optional OCI tag override for preview builds only (defaults to sha-<commit>)
        required: false
        type: string
      publish_latest:
        description: Also tag the pushed artifact as latest (preview builds should leave this false)
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEY_ID: demandops-public-1
      SDK_REF: v0.8.23
      PLATFORM_REF: main
    steps:
      - name: Checkout extension sources
        uses: actions/checkout@v4

      - name: Checkout platform sources for runtime builds
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/platform
          ref: ${{ env.PLATFORM_REF }}
          path: platform

      - name: Checkout extension SDK tooling
        uses: actions/checkout@v4
        with:
          repository: MoveBigRocks/extension-sdk
          ref: ${{ env.SDK_REF }}
          path: mbr-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
          cache: false

      - name: Set up Go workspace
        run: |
          rm -f go.work go.work.sum
          go work init .
          go work use ./platform

      - name: Install ORAS
        run: |
          VERSION="1.2.0"
          curl -LO "https://github.com/oras-project/oras/releases/download/v${VERSION}/oras_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "oras_${VERSION}_linux_amd64.tar.gz"
          sudo mv oras /usr/local/bin/
          oras version

      - name: Resolve publication target
        id: target
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            ref_name="${GITHUB_REF_NAME}"
            case "${ref_name}" in
              ats-v*)
                extension="ats"
                source_dir="ats"
                image="ghcr.io/movebigrocks/mbr-ext-ats"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-ats-runtime"
                runtime_cmd="./cmd/ats-runtime"
                needs_runtime="true"
                publish_tag="${ref_name#ats-}"
                ;;
              community-feature-requests-v*)
                extension="community-feature-requests"
                source_dir="community-feature-requests"
                image="ghcr.io/movebigrocks/mbr-ext-community-feature-requests"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-community-feature-requests-runtime"
                runtime_cmd="./cmd/community-feature-requests-runtime"
                needs_runtime="true"
                publish_tag="${ref_name#community-feature-requests-}"
                ;;
              error-tracking-v*)
                extension="error-tracking"
                source_dir="error-tracking"
                image="ghcr.io/movebigrocks/mbr-ext-error-tracking"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-error-tracking-runtime"
                runtime_cmd="./cmd/error-tracking-runtime"
                needs_runtime="true"
                publish_tag="${ref_name#error-tracking-}"
                ;;
              sales-pipeline-v*)
                extension="sales-pipeline"
                source_dir="sales-pipeline"
                image="ghcr.io/movebigrocks/mbr-ext-sales-pipeline"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-sales-pipeline-runtime"
                runtime_cmd="./cmd/sales-pipeline-runtime"
                needs_runtime="true"
                publish_tag="${ref_name#sales-pipeline-}"
                ;;
              web-analytics-v*)
                extension="web-analytics"
                source_dir="web-analytics"
                image="ghcr.io/movebigrocks/mbr-ext-web-analytics"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-web-analytics-runtime"
                runtime_cmd="./cmd/web-analytics-runtime"
                needs_runtime="true"
                publish_tag="${ref_name#web-analytics-}"
                ;;
              *)
                echo "Unsupported release tag: ${ref_name}" >&2
                exit 1
                ;;
            esac
            publish_latest="true"
          else
            extension="${{ github.event.inputs.extension }}"
            case "${extension}" in
              ats)
                source_dir="ats"
                image="ghcr.io/movebigrocks/mbr-ext-ats"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-ats-runtime"
                runtime_cmd="./cmd/ats-runtime"
                needs_runtime="true"
                ;;
              community-feature-requests)
                source_dir="community-feature-requests"
                image="ghcr.io/movebigrocks/mbr-ext-community-feature-requests"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-community-feature-requests-runtime"
                runtime_cmd="./cmd/community-feature-requests-runtime"
                needs_runtime="true"
                ;;
              error-tracking)
                source_dir="error-tracking"
                image="ghcr.io/movebigrocks/mbr-ext-error-tracking"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-error-tracking-runtime"
                runtime_cmd="./cmd/error-tracking-runtime"
                needs_runtime="true"
                ;;
              sales-pipeline)
                source_dir="sales-pipeline"
                image="ghcr.io/movebigrocks/mbr-ext-sales-pipeline"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-sales-pipeline-runtime"
                runtime_cmd="./cmd/sales-pipeline-runtime"
                needs_runtime="true"
                ;;
              web-analytics)
                source_dir="web-analytics"
                image="ghcr.io/movebigrocks/mbr-ext-web-analytics"
                runtime_image="ghcr.io/movebigrocks/mbr-ext-web-analytics-runtime"
                runtime_cmd="./cmd/web-analytics-runtime"
                needs_runtime="true"
                ;;
              *)
                echo "Unsupported extension input: ${extension}" >&2
                exit 1
                ;;
            esac
            publish_tag="${{ github.event.inputs.publish_tag }}"
            if [[ -z "${publish_tag}" ]]; then
              publish_tag="sha-${GITHUB_SHA::12}"
            fi
            publish_latest="${{ github.event.inputs.publish_latest }}"
          fi

          echo "extension=${extension}" >> "${GITHUB_OUTPUT}"
          echo "source_dir=${source_dir}" >> "${GITHUB_OUTPUT}"
          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "runtime_image=${runtime_image}" >> "${GITHUB_OUTPUT}"
          echo "runtime_cmd=${runtime_cmd}" >> "${GITHUB_OUTPUT}"
          echo "needs_runtime=${needs_runtime}" >> "${GITHUB_OUTPUT}"
          echo "publish_tag=${publish_tag}" >> "${GITHUB_OUTPUT}"
          echo "publish_latest=${publish_latest}" >> "${GITHUB_OUTPUT}"

      - name: Guard release publication semantics
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail

          publish_tag="${{ steps.target.outputs.publish_tag }}"
          publish_latest="${{ steps.target.outputs.publish_latest }}"

          if [[ "${publish_tag}" =~ ^v[0-9] ]]; then
            echo "workflow_dispatch is only for preview tags such as sha-<commit> or preview-<name>." >&2
            echo "Push a matching git release tag for semver publication instead." >&2
            exit 1
          fi

          if [[ "${publish_latest}" == "true" ]]; then
            echo "workflow_dispatch preview publications must not retag latest." >&2
            exit 1
          fi

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build runtime binary
        if: ${{ steps.target.outputs.needs_runtime == 'true' }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -o "dist/${{ steps.target.outputs.extension }}-runtime" \
            "${{ steps.target.outputs.runtime_cmd }}"
          tar -czf "dist/${{ steps.target.outputs.extension }}-runtime-linux-amd64.tar.gz" \
            -C dist "${{ steps.target.outputs.extension }}-runtime"

      - name: Publish runtime artifact to GHCR
        if: ${{ steps.target.outputs.needs_runtime == 'true' }}
        id: runtime_publish
        run: |
          oras push "${{ steps.target.outputs.runtime_image }}:${{ steps.target.outputs.publish_tag }}" \
            --disable-path-validation \
            --artifact-type application/vnd.mbr.extension.runtime.v1+tar+gzip \
            "dist/${{ steps.target.outputs.extension }}-runtime-linux-amd64.tar.gz:application/gzip"
          if [[ "${{ steps.target.outputs.publish_latest }}" == "true" ]]; then
            oras tag "${{ steps.target.outputs.runtime_image }}:${{ steps.target.outputs.publish_tag }}" latest
          fi
          digest="$(oras manifest fetch "${{ steps.target.outputs.runtime_image }}:${{ steps.target.outputs.publish_tag }}" --descriptor | jq -r '.digest')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Prepare staged bundle source
        run: |
          rm -rf staged-source
          mkdir -p staged-source
          cp -R "${{ steps.target.outputs.source_dir }}" "staged-source/${{ steps.target.outputs.source_dir }}"
          if [[ "${{ steps.target.outputs.needs_runtime }}" == "true" ]]; then
            tmp_manifest="$(mktemp)"
            jq \
              --arg runtime_ref "${{ steps.target.outputs.runtime_image }}:${{ steps.target.outputs.publish_tag }}" \
              --arg runtime_digest "${{ steps.runtime_publish.outputs.digest }}" \
              '.runtime.protocol = "unix_socket_http" | .runtime.ociReference = $runtime_ref | .runtime.digest = $runtime_digest' \
              "staged-source/${{ steps.target.outputs.source_dir }}/manifest.json" > "${tmp_manifest}"
            mv "${tmp_manifest}" "staged-source/${{ steps.target.outputs.source_dir }}/manifest.json"
          fi

      - name: Build raw bundle
        working-directory: mbr-sdk
        run: |
          sdk_root="${GITHUB_WORKSPACE}/mbr-sdk"
          source_root="${GITHUB_WORKSPACE}/staged-source/${{ steps.target.outputs.source_dir }}"
          out_path="${GITHUB_WORKSPACE}/dist/${{ steps.target.outputs.extension }}.bundle.json"
          if [[ ! -f "${sdk_root}/scripts/build-bundle.go" ]]; then
            echo "::error title=Missing SDK build script::${sdk_root}/scripts/build-bundle.go is missing" >&2
            echo "missing build script: ${sdk_root}/scripts/build-bundle.go" >&2
            exit 1
          fi
          if [[ ! -f "${source_root}/manifest.json" ]]; then
            echo "::error title=Missing extension manifest::${source_root}/manifest.json is missing" >&2
            echo "missing manifest: ${source_root}/manifest.json" >&2
            ls -la "${GITHUB_WORKSPACE}" >&2
            exit 1
          fi
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          go run ./scripts/build-bundle.go \
            --source "${source_root}" \
            --out "${out_path}"

      - name: Sign public bundle
        working-directory: mbr-sdk
        env:
          MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64: ${{ secrets.MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64 }}
        run: |
          if [[ -z "${MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64}" ]]; then
            echo "::error title=Missing signing secret::Set MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64 in the MoveBigRocks/extensions repo secrets." >&2
            echo "MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64 is required" >&2
            exit 1
          fi
          go run ./scripts/sign-bundle.go \
            --bundle "${GITHUB_WORKSPACE}/dist/${{ steps.target.outputs.extension }}.bundle.json" \
            --out "${GITHUB_WORKSPACE}/dist/${{ steps.target.outputs.extension }}.signed.bundle.json" \
            --key-id "${SIGNING_KEY_ID}" \
            --private-key-env MBR_EXTENSION_SIGNING_PRIVATE_KEY_B64 \
            --publisher-key-out "${GITHUB_WORKSPACE}/dist/${{ steps.target.outputs.extension }}.publisher-key.json"

      - name: Publish bundle to GHCR
        id: publish
        working-directory: mbr-sdk
        run: |
          extra_args=()
          if [[ "${{ steps.target.outputs.publish_latest }}" == "true" ]]; then
            extra_args+=(--extra-tag latest)
          fi
          bash ./scripts/publish-bundle-oci.sh \
            --bundle "${GITHUB_WORKSPACE}/dist/${{ steps.target.outputs.extension }}.signed.bundle.json" \
            --image "${{ steps.target.outputs.image }}" \
            --tag "${{ steps.target.outputs.publish_tag }}" \
            "${extra_args[@]}"

      - name: Resolve bundle digest
        id: bundle_publish
        run: |
          digest="$(oras manifest fetch "${{ steps.target.outputs.image }}:${{ steps.target.outputs.publish_tag }}" --descriptor | jq -r '.digest')"
          echo "digest=${digest}" >> "${GITHUB_OUTPUT}"

      - name: Write publication evidence
        run: |
          go run ./tools/publication-evidence \
            --mode release \
            --source-root "${GITHUB_WORKSPACE}" \
            --slug "${{ steps.target.outputs.extension }}" \
            --repository "${GITHUB_REPOSITORY}" \
            --event-name "${GITHUB_EVENT_NAME}" \
            --git-sha "${GITHUB_SHA}" \
            --workflow-run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --published-at "$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
            --publish-tag "${{ steps.target.outputs.publish_tag }}" \
            --publish-latest="${{ steps.target.outputs.publish_latest }}" \
            --bundle-ref "${{ steps.target.outputs.image }}:${{ steps.target.outputs.publish_tag }}" \
            --bundle-digest "${{ steps.bundle_publish.outputs.digest }}" \
            --runtime-ref "${{ steps.target.outputs.runtime_image }}:${{ steps.target.outputs.publish_tag }}" \
            --runtime-digest "${{ steps.runtime_publish.outputs.digest }}" \
            --out "${GITHUB_WORKSPACE}/dist/${{ steps.target.outputs.extension }}.publication-evidence.json"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: public-bundle-${{ steps.target.outputs.extension }}-${{ steps.target.outputs.publish_tag }}
          path: dist/*

      - name: Publish summary
        run: |
          {
            echo "## Public Bundle Published"
            echo
            echo "- Extension: \`${{ steps.target.outputs.extension }}\`"
            echo "- Source: \`${{ steps.target.outputs.source_dir }}\`"
            echo "- SDK ref: \`${SDK_REF}\`"
            echo "- OCI Ref: \`${{ steps.target.outputs.image }}:${{ steps.target.outputs.publish_tag }}\`"
            echo "- Bundle Digest: \`${{ steps.bundle_publish.outputs.digest }}\`"
            if [[ "${{ steps.target.outputs.needs_runtime }}" == "true" ]]; then
              echo "- Runtime Ref: \`${{ steps.target.outputs.runtime_image }}:${{ steps.target.outputs.publish_tag }}\`"
              echo "- Runtime Digest: \`${{ steps.runtime_publish.outputs.digest }}\`"
            fi
            echo "- Install: \`mbr extensions install ${{ steps.target.outputs.image }}:${{ steps.target.outputs.publish_tag }} --workspace WORKSPACE_ID\`"
            if [[ "${{ steps.target.outputs.publish_latest }}" == "true" ]]; then
              echo "- Also tagged as: \`${{ steps.target.outputs.image }}:latest\`"
            fi
            echo
            echo "Trusted publisher key snippet is uploaded as a workflow artifact."
          } >> "${GITHUB_STEP_SUMMARY}"
